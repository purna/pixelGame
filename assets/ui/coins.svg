<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Main gold gradient with metallic shine -->
    <linearGradient id="coinGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FF8C00;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#DAA520;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    
    <!-- Top highlight for 3D effect -->
    <radialGradient id="topHighlight" cx="35%" cy="35%" r="60%">
      <stop offset="0%" style="stop-color:#FFF8DC;stop-opacity:0.9" />
      <stop offset="40%" style="stop-color:#FFD700;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:0.1" />
    </radialGradient>
    
    <!-- Side shadow for depth -->
    <radialGradient id="sideShadow" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#B8860B;stop-opacity:0" />
      <stop offset="70%" style="stop-color:#8B6914;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#654321;stop-opacity:0.6" />
    </radialGradient>
    
    <!-- Inner rim gradient -->
    <linearGradient id="rimGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DAA520;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#B8860B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B6914;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Coin edge/rim - gives thickness appearance -->
  <ellipse cx="16" cy="16" rx="14" ry="13.5" fill="url(#rimGradient)" stroke="#654321" stroke-width="0.5"/>
  
  <!-- Side shadow for 3D depth -->
  <ellipse cx="16" cy="16" rx="13.5" ry="13" fill="url(#sideShadow)"/>
  
  <!-- Main coin face -->
  <circle cx="16" cy="16" r="12" fill="url(#coinGradient)" stroke="#8B6914" stroke-width="1"/>
  
  <!-- Top highlight for 3D shine -->
  <ellipse cx="12" cy="10" rx="6" ry="4" fill="url(#topHighlight)" opacity="0.8"/>
  
  <!-- Center design - 3D effect with multiple layers -->
  <circle cx="16" cy="16" r="6" fill="url(#topHighlight)" opacity="0.4"/>
  <circle cx="16" cy="16" r="4" fill="#FFD700" stroke="#8B6914" stroke-width="0.5"/>
  
  <!-- Inner highlight -->
  <circle cx="14" cy="14" r="2" fill="#FFF8DC" opacity="0.6"/>
  
  <!-- Small center dot for detail -->
  <circle cx="16" cy="16" r="1.5" fill="#8B6914" opacity="0.8"/>
  
  <!-- Edge bevel highlight -->
  <ellipse cx="16" cy="8" rx="11" ry="3" fill="#FFF8DC" opacity="0.3"/>
  
  <!-- Subtle texture lines for metallic feel -->
  <g opacity="0.15">
    <line x1="16" y1="6" x2="16" y2="26" stroke="#8B6914" stroke-width="0.5"/>
    <line x1="10" y1="10" x2="22" y2="22" stroke="#8B6914" stroke-width="0.3"/>
    <line x1="22" y1="10" x2="10" y2="22" stroke="#8B6914" stroke-width="0.3"/>
  </g>
  
  <!-- Outer rim highlight for thickness -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#FFF8DC" stroke-width="0.5" opacity="0.4"/>
</svg>
