<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moses - Egyptian Platformer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Elms+Sans:wght@400;700&family=Noto+Serif:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="portfolio-container dialog_border" id="start-modal" role="dialog" aria-modal="true">
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>
        
        <h1>MOSES</h1>
        <p>Explore my work through this interactive platformer game!</p>
        <button id="start-game" class="gameButton">Start Game</button>
    </div>

    <div class="game-container" id="game-root">
        <div class="collectables-counter">
            <span class="collectables-label">Collectables: </span>
            <img src="assets/ui/coins.svg" alt="Coins" class="coin-icon">
            <span id="collectables-count">0</span></div>
        <div class="lives-counter">
            <span class="lives-label">Lives <span id="lives-count">3</span></span>
            <span class="life"><img src="assets/ui/heart.svg" alt="Heart" class="heart-icon"></span>
            <span class="life"><img src="assets/ui/heart.svg" alt="Heart" class="heart-icon"></span>
            <span class="life"><img src="assets/ui/heart.svg" alt="Heart" class="heart-icon"></span>
        </div>
        <button id="sound-toggle" class="sound-button" title="Toggle Sound"><i class="fa-solid fa-volume-high"></i></button>
        <canvas id="game-canvas"></canvas>
    </div>

    <div id="level-complete" class="level-complete dialog_border" style="display:none;">
        <h2>Level Complete!</h2>
        <p>Great job! Moving to the next level...</p>
    </div>
    <div id="game-over" class="game-over dialog_border" style="display:none;">
        <h2>Game Over!</h2>
        <p>You have lost all your lives. Try again!</p>
        <button id="restart-game" class="gameButton">Play Again</button>
    </div>

    <!-- Keep your game scripts so the canvas/game logic loads in background but only displays after start -->
    <script src="https://cdn.jsdelivr.net/npm/roughjs@4.5.2/bundled/rough.min.js"></script>
    <script src="plugins/howler.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

    <script src="js/config.js"></script>
    <script src="js/texture-manager.js"></script>
    <script src="js/parallax-manager.js"></script>
    <script src="js/ui-manager.js"></script>
    <script src="js/audio-manager.js"></script>
    <script src="js/ink-dialogue.js"></script>
    <script src="js/particle-burst.js" defer></script>
    <script type="module" src="js/game.js"></script>

    <script>
        // Hide modal and reveal game when Start is clicked; dispatch 'startGame' for game boot logic
        document.getElementById('start-game').addEventListener('click', function() {
            const modal = document.getElementById('start-modal');
            const gameRoot = document.getElementById('game-root');
            if (modal) modal.style.display = 'none';
            if (gameRoot) gameRoot.style.display = 'block';
            // If your game listens for a custom event to begin, this will trigger it
            window.dispatchEvent(new CustomEvent('startGame'));
        });

        // Restart button behavior
        const restartBtn = document.getElementById('restart-game');
        if (restartBtn) restartBtn.addEventListener('click', function() {
            window.location.reload();
        });

        // Sound toggle functionality - simple and reliable
        function initializeSoundToggle() {
            const soundToggleBtn = document.getElementById('sound-toggle');
            if (!soundToggleBtn) {
                console.error('Sound toggle button not found');
                return;
            }
            
            console.log('Sound toggle button found:', soundToggleBtn);
            
            // Remove any existing listeners to avoid duplicates
            const newBtn = soundToggleBtn.cloneNode(true);
            soundToggleBtn.parentNode.replaceChild(newBtn, soundToggleBtn);
            
            let isMuted = false;
            
            newBtn.addEventListener('click', function() {
                isMuted = !isMuted;
                console.log('Sound toggle clicked, muting:', isMuted);
                
                // Use Howler directly
                if (typeof Howler !== 'undefined') {
                    Howler.mute(isMuted);
                    console.log('Howler.mute called successfully with:', isMuted);
                } else {
                    console.error('Howler is not defined');
                }
                
                // Update button appearance
                if (isMuted) {
                    newBtn.innerHTML = '<i class="fa-solid fa-volume-xmark"></i>';
                    newBtn.classList.add('muted');
                } else {
                    newBtn.innerHTML = '<i class="fa-solid fa-volume-high"></i>';
                    newBtn.classList.remove('muted');
                }
            });
            
            console.log('Sound toggle button initialized');
        }
        
        // Initialize when start game is clicked
        document.getElementById('start-game').addEventListener('click', function() {
            const modal = document.getElementById('start-modal');
            const gameRoot = document.getElementById('game-root');
            if (modal) modal.style.display = 'none';
            if (gameRoot) gameRoot.style.display = 'block';
            // If your game listens for a custom event to begin, this will trigger it
            window.dispatchEvent(new CustomEvent('startGame'));
            
            // Initialize sound toggle
            initializeSoundToggle();
        });

        // If the game auto-starts on load, but you want it paused until 'startGame', ensure game.js checks for that event.
    </script>
</body>
</html>
